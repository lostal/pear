version: "3.8"

services:
  mongo:
    image: mongo:6.0.26
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: productos

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/productos
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - JWT_SECRET=Clave
    depends_on:
      - mongo
      - redis
    volumes:
      # 1. Hot Reload: Map local files to container
      - ./backend:/app
      # 2. Persist node_modules: Use named volume to ensure fresh copy from image on first run
      - backend_modules_cache:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && node seed.js && npm run dev"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  backend_modules_cache:  # Fresh volume to fix stale/empty node_modules issue
